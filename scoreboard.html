<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Snooker Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;500;600;700;800&family=Barlow:wght@400;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#0a0a0a;color:#fff;font-family:'Barlow',sans-serif;width:100vw;height:100vh;overflow:hidden;display:flex;flex-direction:column;}

/* ===== OVERVIEW ===== */
#ov{display:none;flex-direction:column;height:100vh;}
.ov-hdr{background:linear-gradient(180deg,#1a4a1a,#0d2e0d);border-bottom:3px solid #2d8c2d;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.ov-logo{font-family:'Bebas Neue',cursive;font-size:1.5rem;letter-spacing:5px;color:#f0c040;}
.ov-tn{font-size:0.88rem;color:rgba(255,255,255,0.7);letter-spacing:2px;}
.live-dot{display:flex;align-items:center;gap:6px;font-size:0.7rem;color:#e74c3c;letter-spacing:2px;}
.live-dot::before{content:'';width:7px;height:7px;border-radius:50%;background:#e74c3c;animation:blk 1.2s infinite;}
@keyframes blk{0%,100%{opacity:1}50%{opacity:0.2}}
.ov-grid{flex:1;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:3px;background:#111;overflow:hidden;}
.tile{background:#0e0e0e;display:flex;flex-direction:column;position:relative;overflow:hidden;}
.tile.on{background:#111;}
.tile-top{background:linear-gradient(180deg,#1a4a1a,#0d2e0d);border-bottom:2px solid #2a7a2a;padding:6px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tile-num{font-family:'Bebas Neue',cursive;font-size:0.75rem;letter-spacing:2px;color:rgba(240,192,64,0.5);}
.tile.on .tile-num{color:#f0c040;}
.tile-st{font-size:0.55rem;letter-spacing:1px;text-transform:uppercase;color:rgba(255,255,255,0.2);font-weight:bold;}
.tile-st.live{color:#2ecc71;animation:lp 2s infinite;}
@keyframes lp{0%,100%{opacity:1}50%{opacity:0.45}}
.tile-body{flex:1;display:flex;align-items:center;justify-content:center;}
.tile-empty{color:rgba(255,255,255,0.06);font-size:0.75rem;letter-spacing:2px;text-transform:uppercase;}
.tile-match{display:none;width:100%;flex-direction:column;height:100%;}
.tile-players{flex:1;display:grid;grid-template-columns:1fr 1fr;}
.tile-player{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;}
.tp-frames{font-family:'Bebas Neue',cursive;font-size:clamp(2rem,4vw,3.5rem);color:#f0c040;line-height:1;}
.tp-name{font-size:clamp(0.65rem,1.2vw,0.9rem);font-weight:700;color:#fff;text-align:center;margin-top:3px;text-transform:uppercase;letter-spacing:1px;}
.tile-scorebar{background:linear-gradient(180deg,#1e7a1e,#155515);border-top:2px solid #2d8c2d;padding:5px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.tsb-pts{font-family:'Bebas Neue',cursive;font-size:clamp(1.1rem,2.2vw,1.8rem);color:#fff;}
.tsb-right{text-align:right;}
.tsb-mid{font-size:0.6rem;color:rgba(255,255,255,0.5);text-align:center;letter-spacing:1px;}
.tile-foot{padding:4px 10px;display:flex;justify-content:space-between;flex-shrink:0;}
.tile-fl{font-size:0.55rem;color:rgba(255,255,255,0.3);letter-spacing:1px;}

/* ===== SINGLE TABLE ===== */
#st{display:none;flex-direction:column;height:100vh;}

/* Top banner */
.st-banner{background:linear-gradient(180deg,#1e6e1e,#0d4a0d);border-bottom:3px solid #2ecc71;padding:0 28px;height:clamp(38px,6vh,52px);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.st-banner-left{display:flex;align-items:center;gap:14px;min-width:160px;}
.st-banner-tn{font-family:'Barlow Condensed',sans-serif;font-size:clamp(0.85rem,1.8vw,1.2rem);font-weight:700;letter-spacing:3px;color:#fff;text-transform:uppercase;text-align:center;flex:1;}
.st-banner-right{display:flex;align-items:center;gap:14px;min-width:160px;justify-content:flex-end;}
.badge-pill{font-family:'Bebas Neue',cursive;font-size:0.75rem;letter-spacing:2px;color:rgba(255,255,255,0.55);background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);padding:2px 10px;border-radius:20px;}

/* Frame timer */
.frame-timer{font-family:'Barlow Condensed',sans-serif;font-size:0.82rem;color:rgba(255,255,255,0.6);letter-spacing:2px;display:flex;align-items:center;gap:5px;}
.frame-timer::before{content:'⏱';font-size:0.72rem;}

/* Clock */
#clock{font-size:0.72rem;color:rgba(255,255,255,0.5);letter-spacing:1px;font-family:'Barlow Condensed',sans-serif;}

/* Waiting */
.st-wait{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;gap:18px;text-align:center;padding:24px;}
.st-wait h2{font-family:'Bebas Neue',cursive;font-size:2.5rem;letter-spacing:4px;color:#f0c040;}
.st-wait p{font-size:0.8rem;color:rgba(255,255,255,0.28);letter-spacing:2px;}
.pulse-ico{animation:pb 2s ease-in-out infinite;font-size:3rem;display:inline-block;}
@keyframes pb{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

/* Live content */
.st-content{display:none;flex-direction:column;flex:1;overflow:hidden;}

/* Players area */
.players-area{flex:1;display:grid;grid-template-columns:1fr 1fr;background:#0a0a0a;overflow:hidden;min-height:0;}

.player-panel{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:clamp(10px,2.5vh,24px) clamp(14px,3.5vw,50px);position:relative;transition:background .4s;}
.player-panel.left{border-right:1px solid rgba(255,255,255,0.05);}
.player-panel.at-table{background:rgba(240,192,64,0.04);}
.player-panel.left.at-table::after{content:'';position:absolute;left:0;top:15%;bottom:15%;width:4px;background:linear-gradient(180deg,transparent,#2ecc71,transparent);}
.player-panel.right.at-table::after{content:'';position:absolute;right:0;top:15%;bottom:15%;width:4px;background:linear-gradient(180deg,transparent,#2ecc71,transparent);}

/* Frame score — huge yellow */
.frame-score-big{font-family:'Bebas Neue',cursive;font-size:clamp(4rem,13vh,11rem);color:#f0c040;line-height:1;display:inline-block;text-shadow:0 0 50px rgba(240,192,64,0.22);transition:color .3s;}
.player-panel.at-table .frame-score-big{text-shadow:0 0 50px rgba(240,192,64,0.4);}
@keyframes fPop{0%{transform:scale(1)}35%{transform:scale(1.18);color:#fff;text-shadow:0 0 50px rgba(255,255,255,0.55)}100%{transform:scale(1)}}
.frame-pop{animation:fPop .45s cubic-bezier(.36,.07,.19,.97);}

/* Player name */
.player-name-wrap{margin-top:clamp(4px,1.2vh,12px);text-align:center;}
.player-firstname{font-family:'Barlow',sans-serif;font-size:clamp(0.9rem,3vh,2rem);font-weight:400;color:#fff;display:block;letter-spacing:1px;}
.player-surname{font-family:'Barlow',sans-serif;font-size:clamp(0.9rem,3vh,2rem);font-weight:800;color:#fff;display:block;letter-spacing:2px;text-transform:uppercase;}

/* Frame dots */
.frame-dots{display:flex;gap:5px;margin-top:clamp(6px,1.2vh,12px);justify-content:center;}
.fdot{width:10px;height:10px;border-radius:50%;border:2px solid rgba(240,192,64,0.22);background:transparent;transition:background .4s;}
.fdot.won{background:#f0c040;border-color:#f0c040;}

/* ===== STATS BAR — between players and score bar ===== */
.stats-bar{
  background:rgba(0,0,0,0.6);
  border-top:1px solid rgba(255,255,255,0.05);
  border-bottom:1px solid rgba(255,255,255,0.05);
  padding:5px clamp(14px,3vw,40px);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
  gap:10px;
}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:1px;}
.stat-val{font-family:'Bebas Neue',cursive;font-size:clamp(0.9rem,1.8vw,1.3rem);color:#f0c040;line-height:1;}
.stat-lbl{font-size:clamp(0.42rem,0.7vw,0.58rem);color:rgba(255,255,255,0.3);letter-spacing:1px;text-transform:uppercase;}

/* Difference indicator */
.diff-block{display:flex;flex-direction:column;align-items:center;gap:2px;}
.diff-val{font-family:'Bebas Neue',cursive;font-size:clamp(1rem,2vw,1.5rem);line-height:1;}
.diff-val.p1-leads{color:#5dade2;}
.diff-val.p2-leads{color:#e74c3c;}
.diff-val.tied{color:rgba(255,255,255,0.4);}
.diff-lbl{font-size:clamp(0.42rem,0.7vw,0.58rem);color:rgba(255,255,255,0.3);letter-spacing:1px;text-transform:uppercase;}

/* Snookers required badge */
.snookers-badge{
  background:rgba(231,76,60,0.18);
  border:1px solid rgba(231,76,60,0.45);
  color:#e74c3c;
  font-size:clamp(0.48rem,0.8vw,0.65rem);
  font-weight:bold;
  padding:2px 8px;
  border-radius:4px;
  letter-spacing:1px;
  text-transform:uppercase;
  white-space:nowrap;
}

/* ===== GREEN SCORE BAR ===== */
.score-bar{background:linear-gradient(180deg,#1e7a1e,#145514);border-top:3px solid #2d9e2d;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(14px,3.5vw,45px);height:clamp(55px,9vh,82px);flex-shrink:0;}
.pts-display{font-family:'Bebas Neue',cursive;font-size:clamp(2.2rem,6.5vh,5rem);color:#fff;line-height:1;display:inline-block;min-width:clamp(55px,7vw,100px);text-align:center;}
@keyframes sPop{0%{transform:scale(1)}35%{transform:scale(1.15);color:#f0c040}100%{transform:scale(1)}}
.score-pop{animation:sPop .3s cubic-bezier(.36,.07,.19,.97);}

/* Break centre */
.break-center{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;flex:1;}
.break-balls-row{display:flex;align-items:center;gap:clamp(3px,0.6vw,8px);}
.bball{width:clamp(22px,3vw,38px);height:clamp(22px,3vw,38px);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue',cursive;font-size:clamp(0.65rem,1.1vw,1rem);color:#fff;box-shadow:0 3px 8px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.2);position:relative;overflow:hidden;flex-shrink:0;}
.bball::after{content:'';position:absolute;top:13%;left:17%;width:34%;height:24%;background:rgba(255,255,255,0.25);border-radius:50%;transform:rotate(-30deg);}
.bball span{position:relative;z-index:1;}
.bb-red{background:radial-gradient(circle at 35% 35%,#e74c3c,#7b241c);}
.bb-yellow{background:radial-gradient(circle at 35% 35%,#f7dc6f,#c9a000);color:#333;}
.bb-yellow::after{background:rgba(255,255,255,0.35);}
.bb-green{background:radial-gradient(circle at 35% 35%,#52be80,#1a6b35);}
.bb-brown{background:radial-gradient(circle at 35% 35%,#a0714f,#5a3520);}
.bb-blue{background:radial-gradient(circle at 35% 35%,#5dade2,#1a5276);}
.bb-pink{background:radial-gradient(circle at 35% 35%,#f06292,#b71c5d);}
.bb-black{background:radial-gradient(circle at 35% 35%,#4a4a4a,#0d0d0d);border:1px solid #555;}
.break-val-row{display:flex;align-items:center;gap:7px;}
.break-who-lbl{font-size:clamp(0.52rem,0.85vw,0.7rem);color:rgba(255,255,255,0.55);letter-spacing:1px;text-transform:uppercase;}
.break-number{font-family:'Bebas Neue',cursive;font-size:clamp(1.1rem,2.2vw,1.8rem);color:#fff;line-height:1;}
.break-number.cent{color:#f0c040;text-shadow:0 0 18px rgba(240,192,64,0.65);}

/* ===== SHOT CLOCK ===== */
.shot-clock-wrap{
  position:absolute;
  top:clamp(38px,7vh,56px);
  left:50%;
  transform:translateX(-50%);
  z-index:10;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:3px;
  pointer-events:none;
}
.shot-clock{
  font-family:'Bebas Neue',cursive;
  font-size:clamp(1.8rem,4vw,3.2rem);
  color:#fff;
  line-height:1;
  text-shadow:0 2px 10px rgba(0,0,0,0.8);
  transition:color .3s;
  background:rgba(0,0,0,0.55);
  padding:4px 18px;
  border-radius:6px;
  border:1px solid rgba(255,255,255,0.1);
}
.shot-clock.warning{color:#f39c12;border-color:rgba(243,156,18,0.4);}
.shot-clock.danger{color:#e74c3c;border-color:rgba(231,76,60,0.5);animation:scDanger .5s ease-in-out infinite;}
@keyframes scDanger{0%,100%{opacity:1}50%{opacity:0.6}}
.shot-clock-lbl{font-size:0.55rem;color:rgba(255,255,255,0.4);letter-spacing:2px;text-transform:uppercase;}

/* ===== INFO ROW ===== */
.info-row{background:#060606;border-top:1px solid rgba(255,255,255,0.05);padding:4px clamp(14px,3vw,40px);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.reds-section{display:flex;align-items:center;gap:7px;}
.reds-dots{display:flex;gap:3px;flex-wrap:wrap;max-width:140px;}
.rdot{width:clamp(6px,0.9vw,10px);height:clamp(6px,0.9vw,10px);border-radius:50%;transition:all .4s;}
.ron{background:#c0392b;box-shadow:0 0 4px rgba(192,57,43,0.6);}
.roff{background:rgba(255,255,255,0.08);}
.reds-lbl{font-size:0.56rem;color:rgba(255,255,255,0.3);letter-spacing:1px;}
.colours-row{display:flex;align-items:center;gap:4px;}
.cball{width:clamp(9px,1.2vw,14px);height:clamp(9px,1.2vw,14px);border-radius:50%;opacity:0.45;}
.c-y{background:#f7dc6f;}.c-g{background:#2ecc71;}.c-br{background:#a0714f;}.c-bl{background:#2980b9;}.c-pk{background:#e91e8c;}.c-bk{background:#555;border:1px solid #888;}
.info-centre{font-family:'Bebas Neue',cursive;font-size:0.7rem;letter-spacing:3px;color:rgba(255,255,255,0.12);}

/* Winner */
#winner-ov{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.92);flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;}
.wlbl{font-family:'Bebas Neue',cursive;font-size:1.3rem;color:#f0c040;letter-spacing:4px;}
.wname{font-family:'Bebas Neue',cursive;font-size:clamp(3.5rem,9vw,7rem);color:white;letter-spacing:5px;text-shadow:0 0 65px rgba(240,192,64,0.7);}
.wsub{font-family:'Bebas Neue',cursive;font-size:1.7rem;color:#f0c040;letter-spacing:3px;}
.trophy{font-size:3.8rem;animation:tb 1s ease-in-out infinite;}
@keyframes tb{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
#confetti{display:none;position:fixed;inset:0;pointer-events:none;z-index:99;}
</style>
</head>
<body>

<!-- ===== OVERVIEW ===== -->
<div id="ov">
  <div class="ov-hdr">
    <div class="ov-logo">🎱 Snooker</div>
    <div class="ov-tn" id="ov-tn">Tournament</div>
    <div class="live-dot">LIVE</div>
  </div>
  <div class="ov-grid" id="ov-grid"></div>
</div>

<!-- ===== SINGLE TABLE ===== -->
<div id="st" style="position:relative">

  <!-- Green top banner -->
  <div class="st-banner">
    <div class="st-banner-left">
      <div class="badge-pill" id="st-tbadge2">TABLE –</div>
      <div class="frame-timer" id="frame-timer">00:00</div>
    </div>
    <div class="st-banner-tn" id="st-tn">Snooker</div>

  <!-- Waiting -->
  <div class="st-wait" id="st-wait">

  <!-- Live content -->
  <div class="st-content" id="st-content">

    <!-- Shot clock — floats above center -->

      <div class="shot-clock" id="shot-clock">60</div>
      <div class="shot-clock-lbl">Shot Clock</div>
    </div>

    <!-- Players -->
    <div class="players-area">
      <div class="player-panel left" id="p1panel">
        <div class="frame-score-big" id="p1frames">0</div>

          <span class="player-firstname" id="p1firstname">Player</span>
          <span class="player-surname" id="p1surname">ONE</span>
        </div>
        <div class="frame-dots" id="p1dots"></div>
      </div>
      <div class="player-panel right" id="p2panel">
        <div class="frame-score-big" id="p2frames">0</div>
        <div class="player-name-wrap">
          <span class="player-firstname" id="p2firstname">Player</span>
          <span class="player-surname" id="p2surname">TWO</span>
        </div>
        <div class="frame-dots" id="p2dots"></div>
      </div>
    </div>

    <!-- Stats bar -->
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-val" id="pts-remaining">147</div>

      </div>
      <div class="diff-block" id="diff-block">
        <div class="diff-val tied" id="diff-val">0</div>
        <div class="diff-lbl" id="diff-lbl">Tied</div>
      </div>
      <div id="snookers-wrap" style="display:none">
        <div class="snookers-badge" id="snookers-badge">Needs Snookers</div>
      </div>
      <div class="stat-item">
        <div class="stat-val" id="break-high">–</div>
        <div class="stat-lbl">Highest Break</div>
      </div>
    </div>

    <!-- Green score bar -->
    <div class="score-bar">
      <div class="pts-display" id="p1pts">0</div>
      <div class="break-center">
        <div class="break-balls-row" id="break-balls-row"></div>
        <div class="break-val-row" id="break-val-row" style="display:none">
          <span class="break-who-lbl" id="break-who-lbl">Break</span>
          <span class="break-number" id="break-number">0</span>

      <div class="pts-display" id="p2pts">0</div>

    <!-- Info row -->
    <div class="info-row">
      <div class="reds-section">
        <div class="reds-dots" id="rdots"></div>
        <div class="reds-lbl" id="reds-lbl">15 reds remaining</div>
      </div>
      <div class="info-centre">Snooker Scoring System</div>
      <div class="colours-row">
        <div class="cball c-y"></div>
        <div class="cball c-g"></div>
        <div class="cball c-br"></div>
        <div class="cball c-bl"></div>

  </div>

  <!-- Winner overlay -->
  <div id="winner-ov">
    <div class="trophy">🏆</div>
    <div class="wlbl">Match Winner</div>
    <div class="wname" id="winner-name">–</div>
    <div class="wsub">Wins the Match</div>
  </div>
  <canvas id="confetti"></canvas>
</div>

<!-- ===== JS AT BOTTOM ===== -->
<script>
firebase.initializeApp({
  apiKey:"AIzaSyAxNVCaOyZvk69fqR-qTCyjbvE1gAbiBXE",
  authDomain:"snooker-scorer-56573.firebaseapp.com",

  projectId:"snooker-scorer-56573",
  storageBucket:"snooker-scorer-56573.firebasestorage.app",
  messagingSenderId:"774218957368",
  appId:"1:774218957368:web:3b2c9cc363c0627ab35ccd"
});
var db = firebase.database();
var params = new URLSearchParams(window.location.search);
var tbl = params.get('table');
var prev = {p1f:0,p2f:0,p1s:0,p2s:0,brk:0};
var matchState = null;
var timerInterval = null;
var shotClockInterval = null;

function g(id){ return document.getElementById(id); }
function pop(id,cls){ var el=g(id);if(!el)return;el.classList.remove(cls);void el.offsetWidth;el.classList.add(cls); }

// Wall clock
function updateClock(){
  var now=new Date();
  var h=now.getHours().toString().padStart(2,'0');
  var m=now.getMinutes().toString().padStart(2,'0');
  var s=now.getSeconds().toString().padStart(2,'0');
  var el=g('clock');if(el)el.textContent=h+':'+m+':'+s;
}
setInterval(updateClock,1000); updateClock();

// Frame timer — reads frameStartTime from Firebase, counts up locally
function startFrameTimer(){
  if(timerInterval) clearInterval(timerInterval);
  timerInterval = setInterval(function(){
    if(!matchState || !matchState.frameStartTime) return;
    var elapsed = Math.floor((Date.now() - matchState.frameStartTime) / 1000);
    var m = Math.floor(elapsed/60).toString().padStart(2,'0');
    var s = (elapsed%60).toString().padStart(2,'0');
    var el=g('frame-timer');if(el) el.textContent=m+':'+s;
  }, 1000);
}

// Shot clock — reads shotClockStarted from Firebase, counts down locally
function startShotClockTimer(){
  if(shotClockInterval) clearInterval(shotClockInterval);
  shotClockInterval = setInterval(function(){
    if(!matchState) return;
    var enabled = matchState.shotClockEnabled;
    var wrap = g('shot-clock-wrap');
    if(!wrap) return;
    if(!enabled){ wrap.style.display='none'; return; }
    wrap.style.display='flex';
    var duration = matchState.shotClockDuration || 60;
    var started = matchState.shotClockStarted || Date.now();
    var elapsed = Math.floor((Date.now() - started) / 1000);
    var remaining = Math.max(0, duration - elapsed);
    var el = g('shot-clock');
    if(!el) return;
    el.textContent = remaining;
    if(remaining <= 0){
      el.className = 'shot-clock danger';
      el.textContent = '0';
    } else if(remaining <= 10){
      el.className = 'shot-clock danger';
    } else if(remaining <= 20){
      el.className = 'shot-clock warning';
    } else {
      el.className = 'shot-clock';
    }
  }, 200);
}

// Points remaining on table
function calcPtsRemaining(reds){
  // (reds × 8) + colours (2+3+4+5+6+7=27)
  return (reds * 8) + 27;
}

// Name split
function splitName(full){
  var parts=(full||'').trim().split(/\s+/);
  if(parts.length===1)return{first:'',last:parts[0]};
  return{first:parts[0],last:parts.slice(1).join(' ')};
}

if(tbl){
  g('st').style.display='flex';
  g('st-tbadge').textContent='Table '+tbl;
  g('st-tbadge2').textContent='TABLE '+tbl;
  document.title='Table '+tbl+' · Scoreboard';

  db.ref('matches/table-'+tbl).on('value',function(snap){
    var s=snap.val();
    matchState=s;
    if(!s){
      g('st-wait').style.display='flex';
      g('st-content').style.display='none';
      if(timerInterval){clearInterval(timerInterval);timerInterval=null;}
      if(shotClockInterval){clearInterval(shotClockInterval);shotClockInterval=null;}
    } else {
      g('st-wait').style.display='none';
      g('st-content').style.display='flex';
      renderSingle(s);
      if(!timerInterval) startFrameTimer();
      if(!shotClockInterval) startShotClockTimer();
    }
  });

} else {
  g('ov').style.display='flex';
  document.title='Tournament Overview';
  db.ref('tournament').on('value',function(s){
    g('ov-tn').textContent=s.val()||'Snooker Tournament';
  });
  var grid=g('ov-grid');
  [1,2,3,4,5,6].forEach(function(n){
    var div=document.createElement('div');
    div.className='tile';div.id='tile-'+n;
    div.innerHTML=
      '<div class="tile-top"><div class="tile-num" id="tnum-'+n+'">TABLE '+n+'</div><div class="tile-st" id="tst-'+n+'">AVAILABLE</div></div>'+
      '<div class="tile-body" id="tbody-'+n+'">'+
        '<div class="tile-empty" id="temp-'+n+'">No Match</div>'+
        '<div class="tile-match" id="tmatch-'+n+'">'+
          '<div class="tile-players">'+
            '<div class="tile-player"><div class="tp-frames" id="tp1f-'+n+'">0</div><div class="tp-name" id="tp1n-'+n+'">–</div></div>'+
            '<div class="tile-player"><div class="tp-frames" id="tp2f-'+n+'">0</div><div class="tp-name" id="tp2n-'+n+'">–</div></div>'+
          '</div>'+
          '<div class="tile-scorebar">'+
            '<div class="tsb-pts" id="tsb-p1-'+n+'">0</div>'+
            '<div class="tsb-mid" id="tsb-mid-'+n+'">–</div>'+
            '<div class="tsb-pts tsb-right" id="tsb-p2-'+n+'">0</div>'+
          '</div>'+
          '<div class="tile-foot"><div class="tile-fl" id="tfl-'+n+'">Frame 1</div></div>'+
        '</div>'+
      '</div>';
    grid.appendChild(div);
    db.ref('matches/table-'+n).on('value',function(snap){ renderTile(n,snap.val()); });
  });
}

function renderSingle(s){
  g('st-tn').textContent=(s.tournament||'Snooker')+' — Frame '+s.currentFrame+' of '+s.bestOf;

  var n1=splitName(s.player1.name);var n2=splitName(s.player2.name);
  g('p1firstname').textContent=n1.first;g('p1surname').textContent=n1.last;
  g('p2firstname').textContent=n2.first;g('p2surname').textContent=n2.last;

  g('p1panel').className='player-panel left'+(s.turn===1?' at-table':'');
  g('p2panel').className='player-panel right'+(s.turn===2?' at-table':'');

  // Frame scores
  if(s.player1.frames!==prev.p1f){pop('p1frames','frame-pop');prev.p1f=s.player1.frames;}
  if(s.player2.frames!==prev.p2f){pop('p2frames','frame-pop');prev.p2f=s.player2.frames;}
  g('p1frames').textContent=s.player1.frames;
  g('p2frames').textContent=s.player2.frames;

  // Points
  if(s.player1.score!==prev.p1s){pop('p1pts','score-pop');prev.p1s=s.player1.score;}
  if(s.player2.score!==prev.p2s){pop('p2pts','score-pop');prev.p2s=s.player2.score;}
  g('p1pts').textContent=s.player1.score;
  g('p2pts').textContent=s.player2.score;

  // Frame dots
  var needed=Math.ceil(s.bestOf/2),d1='',d2='';
  for(var i=0;i<needed;i++){
    d1+='<div class="fdot'+(i<s.player1.frames?' won':'')+'"></div>';
    d2+='<div class="fdot'+(i<s.player2.frames?' won':'')+'"></div>';
  }
  g('p1dots').innerHTML=d1; g('p2dots').innerHTML=d2;

  // ===== STATS BAR =====
  var reds=Math.max(0,s.redsRemaining||15);
  var ptsLeft=calcPtsRemaining(reds);
  g('pts-remaining').textContent=ptsLeft;

  // Difference
  var diff=s.player1.score-s.player2.score;
  var dv=g('diff-val'),dl=g('diff-lbl'),sw=g('snookers-wrap'),sb=g('snookers-badge');
  if(diff===0){
    dv.textContent='0'; dv.className='diff-val tied'; dl.textContent='Tied'; sw.style.display='none';
  } else {
    var leading=diff>0?1:2;
    var trailing=diff>0?2:1;
    var absDiff=Math.abs(diff);
    var trailingName=s['player'+trailing].name.split(' ')[0];
    var leadingName=s['player'+leading].name.split(' ')[0];
    dv.textContent=absDiff;
    dv.className='diff-val '+(diff>0?'p1-leads':'p2-leads');
    dl.textContent=leadingName+' leads';
    // Snookers needed?
    if(absDiff > ptsLeft){
      sw.style.display='flex';
      var snooksNeeded=Math.ceil((absDiff-ptsLeft)/8)+1;
      sb.textContent=trailingName+' needs '+snooksNeeded+' snooker'+(snooksNeeded>1?'s':'');
    } else {
      sw.style.display='none';
    }
  }

  // Highest break
  var hb=Math.max(s.bestBreak1||0,s.bestBreak2||0);
  g('break-high').textContent=hb>0?hb:'–';

  // Break balls in green bar
  var balls=s.breakBalls||[];var brk=s.currentBreak||0;
  var bRow=g('break-balls-row'),bValRow=g('break-val-row');
  if(brk>0){
    bRow.innerHTML=balls.slice(-6).map(function(b){
      return '<div class="bball bb-'+b.color+'"><span>'+b.value+'</span></div>';
    }).join('');
    bValRow.style.display='flex';
    var bwho=s.breakPlayer===1?n1.last:n2.last;
    g('break-who-lbl').textContent=bwho+"'s Break";
    if(brk!==prev.brk){pop('break-number','score-pop');prev.brk=brk;}
    var bn=g('break-number');
    bn.textContent=brk; bn.className='break-number'+(brk>=100?' cent':'');
  } else {
    bRow.innerHTML='<span style="font-size:0.65rem;color:rgba(255,255,255,0.28);letter-spacing:2px;text-transform:uppercase;">Frame '+s.currentFrame+'</span>';
    bValRow.style.display='none'; prev.brk=0;
  }

  // Reds dots
  var rd='';for(var r=0;r<15;r++) rd+='<div class="rdot '+(r<reds?'ron':'roff')+'"></div>';
  g('rdots').innerHTML=rd; g('reds-lbl').textContent=reds+' reds remaining';

  // Winner
  if(s.matchWinner){
    g('winner-name').textContent=s['player'+s.matchWinner].name;
    g('winner-ov').style.display='flex'; startConfetti();
  }
}

function renderTile(n,s){
  var isLive=s&&s.status==='active';
  g('tile-'+n).className='tile'+(isLive?' on':'');
  g('tnum-'+n).style.color=isLive?'#f0c040':'rgba(240,192,64,0.4)';
  var st=g('tst-'+n);st.className='tile-st'+(isLive?' live':'');st.textContent=isLive?'● LIVE':'AVAILABLE';
  g('temp-'+n).style.display=isLive?'none':'block';
  g('tmatch-'+n).style.display=isLive?'flex':'none';
  if(isLive){
    g('tp1n-'+n).textContent=s.player1.name;g('tp2n-'+n).textContent=s.player2.name;
    g('tp1f-'+n).textContent=s.player1.frames;g('tp2f-'+n).textContent=s.player2.frames;
    g('tsb-p1-'+n).textContent=s.player1.score;g('tsb-p2-'+n).textContent=s.player2.score;
    var diff=s.player1.score-s.player2.score;
    g('tsb-mid-'+n).textContent=diff===0?'=':(diff>0?'+'+diff:diff);
    g('tfl-'+n).textContent='Frame '+s.currentFrame+' · Best of '+s.bestOf;
  }
}

function startConfetti(){
  var c=g('confetti');c.style.display='block';
  var ctx=c.getContext('2d');c.width=window.innerWidth;c.height=window.innerHeight;
  var pts=[];
  for(var i=0;i<110;i++) pts.push({x:Math.random()*c.width,y:Math.random()*-c.height,w:Math.random()*10+4,h:Math.random()*5+3,color:['#f0c040','#c0392b','#27ae60','#2980b9','#e91e8c','#f1c40f'][Math.floor(Math.random()*6)],sp:Math.random()*3+1,a:Math.random()*360,sp2:(Math.random()-.5)*4});
  (function draw(){ctx.clearRect(0,0,c.width,c.height);pts.forEach(function(p){ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.a*Math.PI/180);ctx.fillStyle=p.color;ctx.fillRect(-p.w/2,-p.h/2,p.w,p.h);ctx.restore();p.y+=p.sp;p.a+=p.sp2;if(p.y>c.height)p.y=-20;});requestAnimationFrame(draw);})();
}
</script>
