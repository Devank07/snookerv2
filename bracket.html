<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UPBSA TV — Live Bracket</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;500;600;700;800&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --gold:#c9a227;--gold2:#f0c040;--green:#2ecc71;--red:#e74c3c;--blue:#5dade2;
  --bg:#060d08;--bg2:#0a1610;--bg3:#0d2018;--border:rgba(255,255,255,0.06);
  --text:#e8f4e0;--sub:rgba(232,244,224,0.45);
}
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;}

/* ── HEADER ── */
.site-header{
  background:rgba(0,0,0,0.7);
  border-bottom:2px solid var(--gold);
  padding:0 24px;
  height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(8px);
}
.header-logo{
  font-family:'Bebas Neue',cursive;
  font-size:1.5rem;letter-spacing:5px;color:var(--gold);
  display:flex;align-items:center;gap:10px;
}
.header-logo small{font-family:'Barlow Condensed';font-size:0.7rem;color:var(--sub);letter-spacing:2px;font-weight:500;}
.live-dot{display:flex;align-items:center;gap:6px;font-size:0.7rem;color:var(--red);letter-spacing:2px;font-family:'Barlow Condensed';font-weight:700;}
.live-dot::before{content:'';width:7px;height:7px;border-radius:50%;background:var(--red);animation:livepulse 1.2s infinite;}
@keyframes livepulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.3;transform:scale(.8)}}
#header-clock{font-family:'Barlow Condensed';font-size:0.9rem;color:var(--sub);letter-spacing:2px;}

/* ── LIVE SCORES TICKER ── */
.ticker-wrap{background:#040a05;border-bottom:1px solid var(--border);height:36px;display:flex;align-items:center;overflow:hidden;}
.ticker-tag{background:var(--gold);color:#07120d;font-family:'Barlow Condensed';font-size:0.7rem;font-weight:800;letter-spacing:2px;padding:0 14px;height:100%;display:flex;align-items:center;flex-shrink:0;}
.ticker-scroll{white-space:nowrap;animation:ticker 40s linear infinite;font-family:'Barlow Condensed';font-size:0.82rem;color:var(--sub);letter-spacing:1px;padding-left:30px;}
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-item{display:inline-block;padding:0 30px;}
.ticker-live{color:var(--green);}
.ticker-score{color:var(--gold);font-weight:700;}

/* ── NAV TABS ── */
.nav-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);overflow-x:auto;padding:0 20px;background:var(--bg2);}
.nav-tab{padding:12px 20px;font-family:'Barlow Condensed';font-size:0.85rem;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--sub);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:color .2s;}
.nav-tab:hover{color:var(--text);}
.nav-tab.on{color:var(--gold);border-bottom-color:var(--gold);}

/* ── MAIN ── */
.main{padding:20px;max-width:1400px;margin:0 auto;}

/* ── TOURNAMENT CARDS ── */
.t-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px;margin-bottom:28px;}
.t-card{background:var(--bg3);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .15s;}
.t-card:hover{border-color:rgba(201,162,39,0.4);transform:translateY(-2px);}
.t-card.selected{border-color:var(--gold);}
.t-card-head{background:linear-gradient(135deg,#1a4a1a,#0d2e0d);border-bottom:2px solid #2a7a2a;padding:14px 16px;display:flex;justify-content:space-between;align-items:center;}
.t-card-name{font-family:'Barlow Condensed';font-size:1.05rem;font-weight:700;color:var(--text);letter-spacing:1px;}
.sport-badge{font-size:0.62rem;padding:2px 8px;border-radius:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.sb-snooker{background:rgba(46,204,113,0.15);color:var(--green);border:1px solid rgba(46,204,113,0.3);}
.sb-billiards{background:rgba(93,173,226,0.15);color:var(--blue);border:1px solid rgba(93,173,226,0.3);}
.sb-pool{background:rgba(231,76,60,0.15);color:var(--red);border:1px solid rgba(231,76,60,0.3);}
.t-card-body{padding:14px 16px;}
.t-card-meta{font-size:0.75rem;color:var(--sub);line-height:1.8;margin-bottom:10px;}
.t-cats{display:flex;flex-wrap:wrap;gap:5px;}
.cat-chip{font-size:0.62rem;padding:2px 8px;background:rgba(201,162,39,0.08);border:1px solid rgba(201,162,39,0.2);border-radius:10px;color:rgba(201,162,39,0.8);}
.t-status{font-size:0.62rem;padding:2px 9px;border-radius:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-top:8px;display:inline-block;}
.ts-active{background:rgba(46,204,113,0.12);color:var(--green);border:1px solid rgba(46,204,113,0.3);animation:livepulse 2s infinite;}
.ts-draft{background:rgba(255,255,255,0.05);color:var(--sub);border:1px solid var(--border);}
.ts-done{background:rgba(93,173,226,0.12);color:var(--blue);border:1px solid rgba(93,173,226,0.3);}

/* ── LIVE SCORES PANEL ── */
.live-section-title{font-family:'Barlow Condensed';font-size:0.72rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--gold);margin-bottom:14px;display:flex;align-items:center;gap:10px;}
.live-section-title::after{content:'';flex:1;height:1px;background:rgba(201,162,39,0.2);}

.live-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px;margin-bottom:28px;}
.live-card{background:var(--bg3);border:1px solid rgba(46,204,113,0.3);border-radius:10px;overflow:hidden;}
.live-card-head{background:linear-gradient(135deg,#0d2a15,#091e0e);padding:8px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(46,204,113,0.15);}
.live-tnum{font-family:'Barlow Condensed';font-size:0.7rem;font-weight:700;letter-spacing:2px;color:var(--gold);}
.live-mid{font-size:0.6rem;font-weight:700;letter-spacing:1px;color:rgba(201,162,39,0.55);font-family:'Barlow Condensed';}
.live-pip{display:flex;align-items:center;gap:4px;font-size:0.62rem;color:var(--green);}
.live-pip::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:livepulse 1.5s infinite;}
.live-card-body{padding:10px 12px;}
.live-players{display:flex;align-items:center;gap:6px;}
.lp{flex:1;}
.lp.right{text-align:right;}
.lp.at .lp-name{color:var(--gold2);}
.lp-name{font-family:'Barlow Condensed';font-size:0.92rem;font-weight:700;color:var(--text);line-height:1;}
.lp-state{font-size:0.6rem;color:var(--sub);}
.score-mid{display:flex;flex-direction:column;align-items:center;min-width:52px;}
.score-frames{display:flex;align-items:center;gap:3px;}
.sf{font-family:'Bebas Neue',cursive;font-size:1.8rem;color:var(--gold);line-height:1;}
.sd{font-size:0.9rem;color:rgba(255,255,255,0.18);}
.score-meta{font-size:0.55rem;color:var(--sub);letter-spacing:1px;}
.live-break{background:#040b06;padding:5px 12px;display:flex;align-items:center;justify-content:space-between;border-top:1px solid var(--border);}
.brk-info{font-size:0.7rem;color:var(--sub);}
.brk-info strong{color:var(--gold);}
.pts-info{font-size:0.65rem;color:var(--sub);}

/* ── BRACKET ── */
.bracket-section{margin-bottom:32px;}
.bracket-tournament-title{font-family:'Bebas Neue',cursive;font-size:1.6rem;letter-spacing:4px;color:var(--text);margin-bottom:4px;}
.bracket-tournament-sub{font-size:0.75rem;color:var(--sub);margin-bottom:20px;}

/* Category selector */
.cat-tabs{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px;}
.cat-tab{padding:6px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:20px;font-size:0.75rem;font-family:'Barlow Condensed';font-weight:600;letter-spacing:1px;color:var(--sub);cursor:pointer;transition:all .15s;}
.cat-tab:hover{border-color:rgba(201,162,39,0.3);color:var(--text);}
.cat-tab.on{background:rgba(201,162,39,0.1);border-color:var(--gold);color:var(--gold);}

/* Stage label */
.stage-label{font-size:0.65rem;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:rgba(201,162,39,0.65);margin:20px 0 10px;display:flex;align-items:center;gap:8px;}
.stage-label::after{content:'';flex:1;height:1px;background:rgba(201,162,39,0.15);}

/* Groups grid */
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:16px;}
.group-box{background:var(--bg2);border:1px solid var(--border);border-radius:9px;overflow:hidden;}
.group-head{background:rgba(201,162,39,0.07);border-bottom:1px solid rgba(201,162,39,0.14);padding:7px 12px;display:flex;justify-content:space-between;align-items:center;}
.group-name{font-family:'Barlow Condensed';font-size:0.72rem;font-weight:700;color:var(--gold);letter-spacing:2px;}
.group-adv{font-size:0.6rem;color:var(--sub);}
.group-player{display:flex;align-items:center;gap:8px;padding:6px 12px;border-bottom:1px solid rgba(255,255,255,0.03);}
.group-player:last-child{border-bottom:none;}
.gp-num{width:18px;height:18px;border-radius:50%;background:rgba(201,162,39,0.1);border:1px solid rgba(201,162,39,0.2);display:flex;align-items:center;justify-content:center;font-size:0.58rem;color:var(--gold);font-weight:700;flex-shrink:0;}
.gp-name{font-size:0.78rem;color:var(--text);flex:1;}
.gp-state{font-size:0.6rem;color:var(--sub);}

/* Match table */
.match-table{width:100%;border-collapse:collapse;font-size:0.8rem;margin-bottom:16px;}
.match-table th{background:var(--bg2);padding:7px 10px;text-align:left;font-size:0.6rem;letter-spacing:2px;text-transform:uppercase;color:rgba(232,244,224,0.32);border-bottom:1px solid var(--border);font-family:'Barlow Condensed';}
.match-table td{padding:8px 10px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle;}
.match-table tr:hover td{background:rgba(255,255,255,0.015);}
.match-table tr.live-match td{background:rgba(46,204,113,0.04);}
.match-table tr.live-match td:first-child{border-left:3px solid var(--green);}
.player-name-cell{font-weight:600;color:var(--text);}
.player-name-cell.winner{color:var(--gold);font-weight:700;}
.player-name-cell.tbd{color:var(--sub);font-style:italic;}
.score-cell{font-family:'Barlow Condensed';font-size:0.95rem;font-weight:700;color:var(--gold);text-align:center;white-space:nowrap;}
.bo-cell{font-size:0.72rem;color:var(--sub);white-space:nowrap;}
.time-cell{font-size:0.7rem;color:var(--sub);white-space:nowrap;}
.tbl-cell{font-size:0.7rem;white-space:nowrap;}
.tbl-chip{display:inline-block;padding:2px 8px;border-radius:4px;font-size:0.68rem;font-weight:700;background:rgba(93,173,226,0.1);color:var(--blue);border:1px solid rgba(93,173,226,0.25);}
.tbl-chip.tv{background:rgba(231,76,60,0.1);color:var(--red);border-color:rgba(231,76,60,0.3);}
.status-chip{display:inline-flex;align-items:center;gap:3px;font-size:0.62rem;font-weight:700;letter-spacing:1px;text-transform:uppercase;}
.sc-live::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--green);animation:livepulse 1.5s infinite;}
.sc-live{color:var(--green);}
.sc-done{color:var(--blue);}
.sc-pending{color:var(--sub);}

/* ── EMPTY / LOADING states ── */
.empty{text-align:center;padding:40px;color:rgba(232,244,224,0.2);font-size:0.88rem;}
.loading{text-align:center;padding:40px;}
.loading-spinner{width:32px;height:32px;border:3px solid rgba(201,162,39,0.2);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── QR SECTION ── */
.qr-section{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:24px;text-align:center;margin-top:32px;}
.qr-title{font-family:'Barlow Condensed';font-size:1rem;font-weight:700;letter-spacing:2px;color:var(--gold);margin-bottom:8px;}
.qr-url{font-size:0.82rem;color:var(--sub);margin-bottom:14px;word-break:break-all;}
#qr-canvas{border-radius:8px;border:3px solid var(--gold);margin-bottom:10px;}

/* ── RESPONSIVE ── */
@media(max-width:600px){
  .main{padding:12px;}
  .site-header{padding:0 14px;}
  .match-table th:nth-child(4),.match-table td:nth-child(4),
  .match-table th:nth-child(5),.match-table td:nth-child(5){display:none;}
}

footer{text-align:center;padding:32px;font-size:0.65rem;color:rgba(232,244,224,0.12);letter-spacing:2px;border-top:1px solid var(--border);margin-top:32px;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="site-header">
  <div class="header-logo">
    UPBSA TV
    <small>Live Bracket</small>
  </div>
  <div class="live-dot">LIVE</div>
  <div id="header-clock">00:00</div>
</div>

<!-- TICKER -->
<div class="ticker-wrap">
  <div class="ticker-tag">LIVE</div>
  <div class="ticker-scroll" id="ticker-scroll">Loading live scores...</div>
</div>

<!-- NAV TABS -->
<div class="nav-tabs">
  <div class="nav-tab on" onclick="showTab('live',this)">Live Scores</div>
  <div class="nav-tab" onclick="showTab('bracket',this)">Bracket & Draw</div>
  <div class="nav-tab" onclick="showTab('results',this)">Results</div>
</div>

<div class="main">

  <!-- ══ LIVE SCORES TAB ══ -->
  <div id="tab-live">
    <div class="live-section-title" style="margin-top:8px;">Live Now</div>
    <div class="live-grid" id="live-grid">
      <div class="empty">No matches live right now.</div>
    </div>
    <div class="live-section-title">All Tournaments</div>
    <div class="t-grid" id="t-grid">
      <div class="loading"><div class="loading-spinner"></div></div>
    </div>
  </div>

  <!-- ══ BRACKET TAB ══ -->
  <div id="tab-bracket" style="display:none">
    <div id="bracket-select-prompt" style="margin-bottom:20px;">
      <div class="live-section-title">Select Tournament</div>
      <div class="t-grid" id="bracket-t-grid"></div>
    </div>
    <div id="bracket-view" style="display:none">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
        <button onclick="backToBracketSelect()" style="padding:6px 14px;background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:6px;color:var(--sub);font-size:0.78rem;cursor:pointer;font-family:'Barlow Condensed';letter-spacing:1px;">← All Tournaments</button>
        <div>
          <div class="bracket-tournament-title" id="bracket-t-name">–</div>
          <div class="bracket-tournament-sub" id="bracket-t-sub">–</div>
        </div>
      </div>
      <div class="cat-tabs" id="bracket-cat-tabs"></div>
      <div id="bracket-content"></div>
    </div>
  </div>

  <!-- ══ RESULTS TAB ══ -->
  <div id="tab-results" style="display:none">
    <div class="live-section-title" style="margin-top:8px;">Match Results</div>
    <div id="results-content">
      <div class="loading"><div class="loading-spinner"></div></div>
    </div>
  </div>

</div>

<footer>UPBSA TV · Live Bracket · Updates in real time · <span id="footer-url"></span></footer>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyAxNVCaOyZvk69fqR-qTCyjbvE1gAbiBXE",
  authDomain:"snooker-scorer-56573.firebaseapp.com",
  databaseURL:"https://snooker-scorer-56573-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"snooker-scorer-56573",
  storageBucket:"snooker-scorer-56573.firebasestorage.app",
  messagingSenderId:"774218957368",
  appId:"1:774218957368:web:3b2c9cc363c0627ab35ccd"
});
var db = firebase.database();

// ── STATE ──
var liveMatches = {};
var allTournaments = {};
var matchHistory = {};
var activeBracketTid = null;
var activeBracketCat = null;

// ── CLOCK ──
setInterval(function(){
  var n=new Date();
  var el=document.getElementById('header-clock');
  if(el) el.textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0');
},1000);
document.getElementById('footer-url').textContent = location.href;

// ── FIREBASE LISTENERS ──
for(var t=1;t<=16;t++){
  (function(n){
    db.ref('matches/table-'+n).on('value',function(snap){
      liveMatches[n]=snap.val();
      renderLiveGrid();
      renderTicker();
      if(activeBracketTid) renderBracketContent();
    });
  })(t);
}

db.ref('tournaments').on('value',function(snap){
  allTournaments=snap.val()||{};
  renderTournamentCards();
  renderBracketTGrid();
});

db.ref('match_history').limitToLast(50).on('value',function(snap){
  matchHistory=snap.val()||{};
  renderResults();
});

// ── TAB SWITCH ──
function showTab(name,el){
  ['live','bracket','results'].forEach(function(t){
    document.getElementById('tab-'+t).style.display='none';
  });
  document.getElementById('tab-'+name).style.display='block';
  document.querySelectorAll('.nav-tab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
}

// ── TICKER ──
function renderTicker(){
  var items=[];
  Object.values(liveMatches).forEach(function(m){
    if(!m||m.status!=='active') return;
    items.push(
      '<span class="ticker-item">'+
        '<span class="ticker-live">● LIVE T'+m.tableNumber+'</span> '+
        '<span>'+esc(m.player1.name)+'</span> '+
        '<span class="ticker-score">'+m.player1.frames+' – '+m.player2.frames+'</span> '+
        '<span>'+esc(m.player2.name)+'</span>'+
        (m.currentBreak>0?' · Break: <span class="ticker-score">'+m.currentBreak+'</span>':'')+
      '</span>'
    );
  });
  if(!items.length) items.push('<span class="ticker-item">No live matches — check back soon</span>');
  // Duplicate for seamless loop
  var ticker=document.getElementById('ticker-scroll');
  var html=items.join('')+items.join('');
  ticker.innerHTML=html;
}

// ── LIVE GRID ── */
function renderLiveGrid(){
  var grid=document.getElementById('live-grid');
  var live=Object.values(liveMatches).filter(function(m){return m&&m.status==='active';});
  if(!live.length){grid.innerHTML='<div class="empty">No matches live right now. Check back soon.</div>';return;}
  grid.innerHTML=live.map(function(m){
    var p1at=m.turn===1,p2at=m.turn===2;
    var brk=m.currentBreak||0;
    var reds=Math.max(0,m.redsRemaining||15);
    var ptsLeft=(reds*8)+27;
    return '<div class="live-card">'+
      '<div class="live-card-head">'+
        '<div class="live-tnum">Table '+m.tableNumber+'</div>'+
        '<div class="live-mid">'+(m.matchId||'')+'</div>'+
        '<div class="live-pip">LIVE</div>'+
      '</div>'+
      '<div class="live-card-body">'+
        '<div class="live-players">'+
          '<div class="lp'+(p1at?' at':'')+'">'+
            '<div class="lp-name">'+esc(m.player1.name)+'</div>'+
            '<div class="lp-state">'+(m.player1.state||'')+'</div>'+
          '</div>'+
          '<div class="score-mid">'+
            '<div class="score-frames"><div class="sf">'+m.player1.frames+'</div><div class="sd">–</div><div class="sf">'+m.player2.frames+'</div></div>'+
            '<div class="score-meta">F'+m.currentFrame+' · BO'+m.bestOf+'</div>'+
          '</div>'+
          '<div class="lp right'+(p2at?' at':'')+'">'+
            '<div class="lp-name">'+esc(m.player2.name)+'</div>'+
            '<div class="lp-state">'+(m.player2.state||'')+'</div>'+
          '</div>'+
        '</div>'+
      '</div>'+
      '<div class="live-break">'+
        '<div class="brk-info">'+
          (brk>0?'Break: <strong>'+brk+'</strong>':esc(m.tournament||''))+ 
        '</div>'+
        '<div class="pts-info">'+ptsLeft+' pts left</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

// ── TOURNAMENT CARDS ──
function renderTournamentCards(){
  var grid=document.getElementById('t-grid');
  var ts=Object.entries(allTournaments);
  if(!ts.length){grid.innerHTML='<div class="empty">No tournaments yet.</div>';return;}
  ts.sort(function(a,b){return (b[1].createdAt||0)-(a[1].createdAt||0);});
  var sl={snooker:'Snooker',billiards:'Billiards','8ball':'8 Ball','9ball':'9 Ball','10ball':'10 Ball'};
  var sc={snooker:'sb-snooker',billiards:'sb-billiards','8ball':'sb-pool','9ball':'sb-pool','10ball':'sb-pool'};
  var stc={draft:'ts-draft',active:'ts-active',finished:'ts-done'};
  grid.innerHTML=ts.map(function(e){
    var id=e[0],t=e[1];
    var cats=t.categories?Object.values(t.categories).map(function(c){return '<span class="cat-chip">'+esc(c.name)+'</span>';}).join(''):'';
    var st=t.status||'draft';
    return '<div class="t-card" onclick="goToBracket(\''+id+'\')" >'+
      '<div class="t-card-head">'+
        '<div class="t-card-name">'+esc(t.name||'')+'</div>'+
        '<span class="sport-badge '+(sc[t.sport]||'sb-snooker')+'">'+esc(sl[t.sport]||t.sport)+'</span>'+
      '</div>'+
      '<div class="t-card-body">'+
        '<div class="t-card-meta">'+
          (t.venue?'📍 '+esc(t.venue)+'<br>':'')+
          (t.startDate?'📅 '+t.startDate+(t.endDate?' – '+t.endDate:'')+'<br>':'')+
          '🎯 '+t.tables+' tables'+
        '</div>'+
        '<div class="t-cats">'+cats+'</div>'+
        '<div class="'+stc[st]+' t-status">'+st.toUpperCase()+'</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

// ── BRACKET ──
function renderBracketTGrid(){
  var grid=document.getElementById('bracket-t-grid');
  var ts=Object.entries(allTournaments);
  if(!ts.length){grid.innerHTML='<div class="empty">No tournaments yet.</div>';return;}
  var sl={snooker:'Snooker',billiards:'Billiards','8ball':'8 Ball','9ball':'9 Ball','10ball':'10 Ball'};
  var sc={snooker:'sb-snooker',billiards:'sb-billiards','8ball':'sb-pool','9ball':'sb-pool','10ball':'sb-pool'};
  var stc={draft:'ts-draft',active:'ts-active',finished:'ts-done'};
  ts.sort(function(a,b){return (b[1].createdAt||0)-(a[1].createdAt||0);});
  grid.innerHTML=ts.map(function(e){
    var id=e[0],t=e[1];
    var st=t.status||'draft';
    return '<div class="t-card" onclick="openBracket(\''+id+'\')" >'+
      '<div class="t-card-head">'+
        '<div class="t-card-name">'+esc(t.name||'')+'</div>'+
        '<span class="sport-badge '+(sc[t.sport]||'sb-snooker')+'">'+esc(sl[t.sport]||t.sport)+'</span>'+
      '</div>'+
      '<div class="t-card-body">'+
        '<div class="t-card-meta">'+(t.startDate||'')+(t.endDate?' – '+t.endDate:'')+'</div>'+
        '<div class="'+stc[st]+' t-status">'+st.toUpperCase()+' · Click to view draw</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

function goToBracket(tid){
  showTab('bracket',document.querySelectorAll('.nav-tab')[1]);
  openBracket(tid);
}

function openBracket(tid){
  var t=allTournaments[tid]; if(!t)return;
  activeBracketTid=tid;
  document.getElementById('bracket-select-prompt').style.display='none';
  document.getElementById('bracket-view').style.display='block';
  document.getElementById('bracket-t-name').textContent=t.name||'–';
  var sl={snooker:'Snooker',billiards:'Billiards','8ball':'8 Ball','9ball':'9 Ball','10ball':'10 Ball'};
  document.getElementById('bracket-t-sub').textContent=
    (sl[t.sport]||t.sport)+(t.startDate?' · '+t.startDate:'')+(t.venue?' · '+t.venue:'');
  // Build category tabs
  var cats=t.categories?Object.values(t.categories):[];
  var tabsEl=document.getElementById('bracket-cat-tabs');
  tabsEl.innerHTML=cats.map(function(c,i){
    return '<div class="cat-tab'+(i===0?' on':'')+'" onclick="switchBracketCat(\''+esc(c.name)+'\',this)">'+esc(c.name)+'</div>';
  }).join('');
  activeBracketCat=cats[0]?cats[0].name:null;
  renderBracketContent();
}

function backToBracketSelect(){
  activeBracketTid=null;
  document.getElementById('bracket-select-prompt').style.display='block';
  document.getElementById('bracket-view').style.display='none';
}

function switchBracketCat(name,el){
  activeBracketCat=name;
  document.querySelectorAll('#bracket-cat-tabs .cat-tab').forEach(function(t){t.classList.remove('on');});
  el.classList.add('on');
  renderBracketContent();
}

function renderBracketContent(){
  var t=allTournaments[activeBracketTid]; if(!t||!activeBracketCat) return;
  var cont=document.getElementById('bracket-content');
  var catk=ck(activeBracketCat);
  var draw=t.draw&&t.draw[catk];
  var tvTable=t.tvTable||1;
  if(!draw){cont.innerHTML='<div class="empty">Draw not generated yet for this category.</div>';return;}
  if(draw.empty){cont.innerHTML='<div class="empty">No players registered for this category.</div>';return;}
  var matches=Object.values(draw.matches||{});
  var html='';

  if(draw.format==='hybrid'){
    // Part 1 groups
    html+='<div class="stage-label">Part 1 — Group Stage</div>';
    html+='<div class="groups-grid">';
    (draw.groups||[]).forEach(function(g){
      html+='<div class="group-box">'+
        '<div class="group-head"><span class="group-name">'+esc(g.name)+'</span><span class="group-adv">Top '+g.advance+' advance</span></div>';
      (g.players||[]).forEach(function(p,i){
        html+='<div class="group-player">'+
          '<div class="gp-num">'+(i+1)+'</div>'+
          '<div class="gp-name">'+esc(p.name)+'</div>'+
          '<div class="gp-state">'+esc(p.state||'')+'</div>'+
        '</div>';
      });
      html+='</div>';
    });
    html+='</div>';
    html+=renderMatchTable(matches.filter(function(m){return m.stage==='part1';}),tvTable);
    html+='<div class="stage-label">Part 2 — Round Robin</div>';
    html+=renderMatchTable(matches.filter(function(m){return m.stage==='part2';}),tvTable);
    html+='<div class="stage-label">Part 3 — Knockout</div>';
    var rounds=[...new Set(matches.filter(function(m){return m.stage==='part3';}).map(function(m){return m.round;}))].sort(function(a,b){return a-b;});
    rounds.forEach(function(r){
      var rm=matches.filter(function(m){return m.stage==='part3'&&m.round===r;});
      if(rm.length) html+='<div style="font-size:0.65rem;color:rgba(232,244,224,0.38);letter-spacing:2px;text-transform:uppercase;margin:10px 0 4px">'+esc(rm[0].roundName||'Round '+r)+'</div>';
      html+=renderMatchTable(rm,tvTable);
    });
  } else if(draw.format==='knockout'){
    var rounds=[...new Set(matches.map(function(m){return m.round;}))].sort(function(a,b){return a-b;});
    rounds.forEach(function(r){
      var rm=matches.filter(function(m){return m.round===r;});
      html+='<div class="stage-label">'+esc(rm[0]&&rm[0].roundName||'Round '+r)+'</div>';
      html+=renderMatchTable(rm,tvTable);
    });
  } else {
    html+='<div class="stage-label">Round Robin</div>';
    html+=renderMatchTable(matches,tvTable);
  }
  cont.innerHTML=html;
}

function renderMatchTable(matches,tvTable){
  if(!matches.length) return '';
  // Enrich with live data
  return '<table class="match-table"><thead><tr>'+
    '<th>#</th><th>Player 1</th><th>Score</th><th>Player 2</th><th>BO</th><th>Table</th><th>Status</th>'+
  '</tr></thead><tbody>'+
  matches.map(function(m,i){
    // Find if this match is live
    var liveM=null;
    if(m.matchId){
      Object.values(liveMatches).forEach(function(lm){
        if(lm&&lm.matchId===m.matchId) liveM=lm;
      });
    }
    var isLive=liveM&&liveM.status==='active';
    var isDone=liveM&&liveM.status==='finished';
    var isTv=m.table===tvTable&&m.table>0;
    var p1=m.p1&&m.p1.name||m.player1&&m.player1.name||(m.p1&&!m.p1.tbd?m.p1.name:'TBD');
    var p2=m.p2&&m.p2.name||m.player2&&m.player2.name||(m.p2&&!m.p2.tbd?m.p2.name:'TBD');
    // Use live names if available
    if(liveM){p1=liveM.player1.name;p2=liveM.player2.name;}
    var isTbd1=p1==='TBD'||p1==='';
    var isTbd2=p2==='TBD'||p2==='';
    var scoreCell='–';
    if(isLive) scoreCell='<span style="color:var(--green);font-weight:700">'+(liveM.player1.frames)+' – '+(liveM.player2.frames)+'</span>';
    else if(isDone) scoreCell='<span style="color:var(--gold);font-weight:700">'+(liveM.player1.frames)+' – '+(liveM.player2.frames)+'</span>';
    var tblCell=m.table>0?'<span class="tbl-chip'+(isTv?' tv':'')+'">T'+m.table+(isTv?' 📺':'')+'</span>':'<span style="color:var(--sub)">–</span>';
    var statusCell=isLive?'<span class="status-chip sc-live">LIVE</span>':isDone?'<span class="status-chip sc-done">DONE</span>':'<span class="status-chip sc-pending">Pending</span>';
    return '<tr'+(isLive?' class="live-match"':'')+'>'+
      '<td style="color:var(--sub);font-size:0.7rem">'+(i+1)+'</td>'+
      '<td class="player-name-cell'+(isTbd1?' tbd':'')+(isDone&&liveM&&liveM.matchWinner===1?' winner':'')+'">'+esc(p1)+'</td>'+
      '<td class="score-cell">'+scoreCell+'</td>'+
      '<td class="player-name-cell'+(isTbd2?' tbd':'')+(isDone&&liveM&&liveM.matchWinner===2?' winner':'')+'">'+esc(p2)+'</td>'+
      '<td class="bo-cell">BO'+m.bo+'</td>'+
      '<td class="tbl-cell">'+tblCell+'</td>'+
      '<td>'+statusCell+'</td>'+
    '</tr>';
  }).join('')+'</tbody></table>';
}

// ── RESULTS ──
function renderResults(){
  var cont=document.getElementById('results-content');
  var rows=Object.values(matchHistory).reverse();
  if(!rows.length){cont.innerHTML='<div class="empty">No results yet.</div>';return;}
  cont.innerHTML='<table class="match-table"><thead><tr>'+
    '<th>Match ID</th><th>Player 1</th><th>Score</th><th>Player 2</th><th>Event</th><th>When</th>'+
  '</tr></thead><tbody>'+
  rows.map(function(r){
    var w=r.winner||'';
    var dt=r.endTime?new Date(r.endTime).toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'}):'–';
    return '<tr>'+
      '<td style="font-family:monospace;font-size:0.75rem;color:var(--gold)">'+esc(r.matchId||'–')+'</td>'+
      '<td class="player-name-cell'+(w===r.p1?' winner':'')+'">'+esc(r.p1||'')+'<div style="font-size:0.6rem;color:var(--sub)">'+esc(r.p1state||'')+'</div></td>'+
      '<td class="score-cell">'+(r.p1frames||0)+' – '+(r.p2frames||0)+'</td>'+
      '<td class="player-name-cell'+(w===r.p2?' winner':'')+'" style="text-align:right">'+esc(r.p2||'')+'<div style="font-size:0.6rem;color:var(--sub);text-align:right">'+esc(r.p2state||'')+'</div></td>'+
      '<td style="font-size:0.72rem;color:var(--sub)">'+esc(r.tournament||'–')+'</td>'+
      '<td style="font-size:0.68rem;color:var(--sub);white-space:nowrap">'+dt+'</td>'+
    '</tr>';
  }).join('')+'</tbody></table>';
}

// ── UTILS ──
function ck(n){return (n||'').replace(/\s+/g,'_').replace(/[^a-zA-Z0-9_]/g,'').toLowerCase();}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>

</html>
