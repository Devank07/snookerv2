<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snooker Tournament Manager</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#000;min-height:100vh;color:#f0f0f0;font-family:'Inter',Arial,sans-serif;padding-bottom:60px;}
.topbar{background:rgba(0,0,0,0.6);border-bottom:2px solid #c9a227;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
.logo{font-size:1.4rem;font-weight:900;color:#c9a227;letter-spacing:3px;}
.logo small{display:block;font-size:0.7rem;color:rgba(232,244,224,0.4);letter-spacing:2px;font-weight:normal;margin-top:2px;}
.t-name{font-size:0.95rem;color:rgba(232,244,224,0.6);letter-spacing:1px;}
.edit-btn{background:rgba(201,162,39,0.1);border:1px solid rgba(201,162,39,0.35);color:#c9a227;padding:7px 14px;border-radius:6px;cursor:pointer;font-size:0.8rem;font-weight:bold;}
#t-edit{display:none;background:#111;border-bottom:1px solid rgba(201,162,39,0.2);padding:12px 24px;gap:10px;align-items:center;flex-wrap:wrap;}
#t-edit.open{display:flex;}
#t-edit input{flex:1;min-width:180px;padding:9px 12px;background:#1a1a1a;border:1px solid rgba(255,255,255,0.1);border-radius:7px;color:#f0f0f0;font-size:0.9rem;}
#t-edit input:focus{outline:none;border-color:#c9a227;}
#t-edit button{padding:9px 18px;background:linear-gradient(135deg,#1c3f1c,#0d2318);color:#c9a227;border:1px solid #c9a227;border-radius:7px;cursor:pointer;font-weight:bold;}
.main{padding:24px;max-width:1280px;margin:0 auto;}
.sec-title{font-size:0.68rem;font-weight:bold;letter-spacing:3px;color:#c9a227;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;gap:10px;}
.sec-title::after{content:'';flex:1;height:1px;background:rgba(201,162,39,0.2);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:18px;margin-bottom:36px;}
.card{background:#111;border:1px solid rgba(255,255,255,0.07);border-radius:13px;overflow:hidden;transition:border-color .2s;}
.card.live{border-color:rgba(201,162,39,0.4);}
.card-head{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,0.02);border-bottom:1px solid rgba(255,255,255,0.05);}
.card.live .card-head{background:rgba(201,162,39,0.06);}
.tnum{font-size:0.78rem;font-weight:bold;letter-spacing:2px;color:rgba(201,162,39,0.55);text-transform:uppercase;}
.card.live .tnum{color:#c9a227;}
.badge{font-size:0.62rem;font-weight:bold;letter-spacing:1px;text-transform:uppercase;padding:3px 9px;border-radius:20px;}
.badge.empty{background:rgba(255,255,255,0.05);color:rgba(232,244,224,0.3);border:1px solid rgba(255,255,255,0.07);}
.badge.live{background:rgba(39,174,96,0.13);color:#2ecc71;border:1px solid rgba(39,174,96,0.3);animation:bp 2s ease-in-out infinite;}
@keyframes bp{0%,100%{opacity:1}50%{opacity:0.55}}
.live-scores{display:none;padding:14px 16px;}
.match-row{display:flex;align-items:center;justify-content:space-between;gap:6px;}
.mp{flex:1;text-align:center;}
.mp.at .mpn{color:#c9a227;}
.mpn{font-size:0.82rem;font-weight:bold;color:#f0f0f0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100px;margin:0 auto;}
.mpf{font-size:2rem;font-weight:900;color:#c9a227;line-height:1;margin-top:1px;}
.mpp{font-size:0.82rem;color:rgba(232,244,224,0.5);}
.match-vs{font-size:1.1rem;color:rgba(255,255,255,0.12);font-weight:bold;}
.match-meta{display:flex;justify-content:space-between;font-size:0.68rem;color:rgba(232,244,224,0.35);letter-spacing:1px;margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.04);}
.form-body{padding:14px 16px;}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.flabel{font-size:0.63rem;font-weight:bold;letter-spacing:2px;text-transform:uppercase;color:rgba(232,244,224,0.4);margin-bottom:5px;}
.finput{width:100%;padding:9px 11px;background:#1a1a1a;border:1px solid rgba(255,255,255,0.08);border-radius:7px;color:#f0f0f0;font-size:0.88rem;}
.finput:focus{outline:none;border-color:#c9a227;}
.finput::placeholder{color:rgba(232,244,224,0.18);}
select.finput option{background:#1a1a1a;}

/* Shot clock settings */
.shot-clock-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px;}
.toggle-row{display:flex;align-items:center;gap:10px;padding:9px 11px;background:#1a1a1a;border:1px solid rgba(255,255,255,0.08);border-radius:7px;}
.toggle-label{font-size:0.85rem;color:#f0f0f0;flex:1;}
.toggle{position:relative;width:36px;height:20px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.slider{position:absolute;cursor:pointer;inset:0;background:#333;border-radius:20px;transition:.3s;}
.slider:before{content:'';position:absolute;width:14px;height:14px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s;}
input:checked+.slider{background:#c9a227;}
input:checked+.slider:before{transform:translateX(16px);}

.card-btns{display:flex;gap:8px;padding:0 16px 14px;}
.btn-start{flex:1;padding:10px;background:linear-gradient(135deg,#1c3f1c,#0d2318);color:#c9a227;border:1.5px solid #c9a227;border-radius:8px;font-size:0.82rem;font-weight:900;letter-spacing:2px;text-transform:uppercase;cursor:pointer;}
.btn-start:hover{background:linear-gradient(135deg,#265226,#122a1c);}
.btn-start:disabled{opacity:.45;cursor:not-allowed;}
.btn-end{padding:10px 14px;background:rgba(192,57,43,0.13);border:1px solid rgba(192,57,43,0.4);color:#e74c3c;border-radius:8px;font-size:0.82rem;font-weight:bold;cursor:pointer;display:none;}
.card-links{border-top:1px solid rgba(255,255,255,0.04);padding:10px 16px;display:flex;gap:7px;flex-wrap:wrap;}
.pl{display:inline-flex;align-items:center;gap:5px;padding:5px 9px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:6px;text-decoration:none;color:rgba(232,244,224,0.5);font-size:0.68rem;letter-spacing:1px;cursor:pointer;transition:border-color .2s,color .2s;}
.pl:hover{border-color:#c9a227;color:#c9a227;}
.glinks{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
.glink{display:flex;align-items:center;gap:12px;padding:13px 16px;background:#111;border:1px solid rgba(255,255,255,0.07);border-radius:10px;text-decoration:none;color:#f0f0f0;transition:border-color .2s;}
.glink:hover{border-color:#c9a227;}
.gi{font-size:1.3rem;flex-shrink:0;}
.gn{font-size:0.92rem;font-weight:bold;}
.gd{font-size:0.7rem;color:rgba(232,244,224,0.38);margin-top:2px;}
.ga{margin-left:auto;color:rgba(232,244,224,0.22);}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1c3f1c;border:1px solid #c9a227;color:#c9a227;padding:9px 20px;border-radius:8px;font-size:0.82rem;font-weight:bold;letter-spacing:1px;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:999;}
#toast.show{opacity:1;}
footer{text-align:center;padding:40px 0 0;font-size:0.63rem;color:rgba(232,244,224,0.08);letter-spacing:1px;}
</style>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="topbar">
  <div class="logo" style="color:#1a1a1a;"><img src="upbsa-logo.jpg" alt="UPBSA" style="height:28px;width:28px;border-radius:50%;object-fit:cover;border:1px solid rgba(201,162,39,0.4);margin-right:6px;">🎱 Snooker Scorer<small>Tournament Manager</small></div>
  <div class="t-name" id="tname-display">Snooker Tournament</div>
  <button class="edit-btn" onclick="toggleEdit()">✏️ Edit Name</button>
</div>
<div id="t-edit">
  <input type="text" id="tname-input" placeholder="Tournament name...">
  <button onclick="saveTName()">Save</button>
  <button onclick="toggleEdit()" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:rgba(232,244,224,0.5);padding:9px 14px;border-radius:7px;cursor:pointer;">Cancel</button>
</div>
<div class="main">
  <div class="sec-title">Live Tables</div>
  <div class="grid" id="grid"></div>
  <div class="sec-title">Global Screens</div>
  <div class="glinks">
    <a class="glink" <a href="dashboard.html" class="navlink">Dashboard</a>
    <a href="scoreboard.html" target="_blank">
      <span class="gi">🏆</span>
      <div><div class="gn">All Tables Overview</div><div class="gd">All 6 tables · tournament display or stream</div></div>
      <span class="ga">↗</span>
    </a>
    <a class="glink" href="diagnostic.html" target="_blank">
      <span class="gi">🔍</span>
      <div><div class="gn">Firebase Diagnostic</div><div class="gd">Check connection and data</div></div>
      <span class="ga">↗</span>
    </a>
  </div>
</div>
<div id="toast"></div>
<footer>Snooker Scoring System · Multi-Table Edition</footer>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyAxNVCaOyZvk69fqR-qTCyjbvE1gAbiBXE",
  authDomain:"snooker-scorer-56573.firebaseapp.com",
  databaseURL:"https://snooker-scorer-56573-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId:"snooker-scorer-56573",
  storageBucket:"snooker-scorer-56573.firebasestorage.app",
  messagingSenderId:"774218957368",
  appId:"1:774218957368:web:3b2c9cc363c0627ab35ccd"
});
var db=firebase.database();
var TABLES=[1,2,3,4,5,6];

db.ref('tournament').on('value',function(s){
  var n=s.val()||'Snooker Tournament';
  document.getElementById('tname-display').textContent=n;
  document.getElementById('tname-input').value=n;
});

function toggleEdit(){document.getElementById('t-edit').classList.toggle('open');}
function saveTName(){
  var v=document.getElementById('tname-input').value.trim();
  if(!v)return;
  db.ref('tournament').set(v);
  document.getElementById('t-edit').classList.remove('open');
}

var grid=document.getElementById('grid');
TABLES.forEach(function(n){
  var div=document.createElement('div');
  div.className='card';div.id='card-'+n;
  div.innerHTML=
    '<div class="card-head">'+
      '<div class="tnum" id="tnum-'+n+'">TABLE '+n+'</div>'+
      '<div class="badge empty" id="badge-'+n+'">AVAILABLE</div>'+
    '</div>'+
    '<div class="live-scores" id="live-'+n+'">'+
      '<div class="match-row">'+
        '<div class="mp" id="p1w-'+n+'"><div class="mpn" id="p1n-'+n+'">–</div><div class="mpf" id="p1f-'+n+'">0</div><div class="mpp" id="p1p-'+n+'">0 pts</div></div>'+
        '<div class="match-vs">–</div>'+
        '<div class="mp" id="p2w-'+n+'"><div class="mpn" id="p2n-'+n+'">–</div><div class="mpf" id="p2f-'+n+'">0</div><div class="mpp" id="p2p-'+n+'">0 pts</div></div>'+
      '</div>'+
      '<div class="match-meta"><div id="finfo-'+n+'">Frame 1</div><div id="brkind-'+n+'"></div></div>'+
    '</div>'+
    '<div class="form-body" id="form-'+n+'">'+
      '<div class="frow">'+
        '<div><div class="flabel">Player 1</div><input class="finput" type="text" id="p1-'+n+'" placeholder="Player 1 name"></div>'+
        '<div><div class="flabel">Player 2</div><input class="finput" type="text" id="p2-'+n+'" placeholder="Player 2 name"></div>'+
      '</div>'+
      '<div class="frow">'+
        '<div><div class="flabel">P1 State</div><select class="finput" id="s1-'+n+'"><option value="">– State –</option>'+STATES.map(function(s){return '<option value="'+s+'">'+s+'</option>';}).join('')+'</select></div>'+
        '<div><div class="flabel">P2 State</div><select class="finput" id="s2-'+n+'"><option value="">– State –</option>'+STATES.map(function(s){return '<option value="'+s+'">'+s+'</option>';}).join('')+'</select></div>'+
      '</div>'+
      '<div class="frow">'+
        '<div><div class="flabel">Format</div><select class="finput" id="bo-'+n+'"><option value="1">Single Frame</option><option value="3">Best of 3</option><option value="5">Best of 5</option><option value="7">Best of 7</option><option value="9" selected>Best of 9</option><option value="11">Best of 11</option><option value="13">Best of 13</option><option value="17">Best of 17</option><option value="19">Best of 19</option></select></div>'+
        '<div><div class="flabel">Breaks First</div><select class="finput" id="bf-'+n+'"><option value="1">Player 1</option><option value="2">Player 2</option></select></div>'+
      '</div>'+
      '<div class="frow">'+
        '<div>'+
          '<div class="flabel">Shot Clock</div>'+
          '<div class="toggle-row">'+
            '<span class="toggle-label">Enable</span>'+
            '<label class="toggle"><input type="checkbox" id="sc-'+n+'"><span class="slider"></span></label>'+
          '</div>'+
        '</div>'+
        '<div><div class="flabel">Shot Clock Time</div><select class="finput" id="scd-'+n+'"><option value="15">15 seconds</option><option value="30">30 seconds</option><option value="60" selected>60 seconds</option><option value="90">90 seconds</option></select></div>'+
      '</div>'+
    '</div>'+
    '<div class="card-btns">'+
      '<button class="btn-start" id="sb-'+n+'" onclick="startMatch('+n+')">▶ Start Match</button>'+
      '<button class="btn-end" id="eb-'+n+'" onclick="endMatch('+n+')">End</button>'+
    '</div>'+
    '<div class="card-links">'+
      '<a class="pl" href="referee.html?table='+n+'" target="_blank">📱 Referee</a>'+
      '<a class="pl" href="scoreboard.html?table='+n+'" target="_blank">📺 Scoreboard</a>'+
      '<span class="pl" onclick="copyOBS('+n+')">🎥 Copy OBS Link</span>'+
    '</div>';
  grid.appendChild(div);
  db.ref('matches/table-'+n).on('value',function(snap){updateCard(n,snap.val());});
});

function updateCard(n,m){
  var isLive=m&&m.status==='active';
  document.getElementById('card-'+n).className='card'+(isLive?' live':'');
  document.getElementById('tnum-'+n).style.color=isLive?'#c9a227':'rgba(201,162,39,0.55)';
  var badge=document.getElementById('badge-'+n);
  badge.className='badge '+(isLive?'live':'empty');
  badge.textContent=isLive?'● LIVE':'AVAILABLE';
  document.getElementById('live-'+n).style.display=isLive?'block':'none';
  document.getElementById('form-'+n).style.display=isLive?'none':'block';
  document.getElementById('eb-'+n).style.display=isLive?'block':'none';
  document.getElementById('sb-'+n).textContent=isLive?'↺ New Match':'▶ Start Match';
  if(isLive){
    document.getElementById('p1n-'+n).textContent=m.player1.name;
    document.getElementById('p2n-'+n).textContent=m.player2.name;
    document.getElementById('p1f-'+n).textContent=m.player1.frames;
    document.getElementById('p2f-'+n).textContent=m.player2.frames;
    document.getElementById('p1p-'+n).textContent=m.player1.score+' pts';
    document.getElementById('p2p-'+n).textContent=m.player2.score+' pts';
    document.getElementById('p1w-'+n).className='mp'+(m.turn===1?' at':'');
    document.getElementById('p2w-'+n).className='mp'+(m.turn===2?' at':'');
    var brk=m.currentBreak||0;
    document.getElementById('brkind-'+n).textContent=brk>0?'Break: '+brk:'';
    document.getElementById('finfo-'+n).textContent='Frame '+m.currentFrame+' · Best of '+m.bestOf;
  }
}


var STATES=['Andhra Pradesh','Arunachal Pradesh','Assam','Bihar','Chandigarh','Chhattisgarh',
  'Delhi','Goa','Gujarat','Haryana','Himachal Pradesh','Jammu & Kashmir','Jharkhand',
  'Karnataka','Kerala','Ladakh','Madhya Pradesh','Maharashtra','Manipur','Meghalaya',
  'Mizoram','Nagaland','Odisha','Puducherry','Punjab','Railways','Rajasthan','Services',
  'Sikkim','Tamil Nadu','Telangana','Tripura','Uttar Pradesh','Uttarakhand','West Bengal'];


// ── MATCH ID — sequential via Firebase counter ──
function getNextMatchId(callback){
  db.ref('meta/matchCounter').transaction(
    function(cur){ return (cur||0)+1; },
    function(err,committed,snap){
      if(err||!committed){ callback('M-'+Date.now()); return; }
      callback('UPBSA-'+String(snap.val()).padStart(4,'0'));
    }
  );
}


function startMatch(n){
  var p1=document.getElementById('p1-'+n).value.trim();
  var p2=document.getElementById('p2-'+n).value.trim();
  var bo=parseInt(document.getElementById('bo-'+n).value);
  var bf=parseInt(document.getElementById('bf-'+n).value);
  var scEnabled=document.getElementById('sc-'+n).checked;
  var scDuration=parseInt(document.getElementById('scd-'+n).value);
  if(!p1||!p2){alert('Enter both player names for Table '+n);return;}
  if(p1===p2){alert('Players must have different names.');return;}
  var btn=document.getElementById('sb-'+n);
  btn.disabled=true;btn.textContent='Starting...';
  var tname=document.getElementById('tname-display').textContent;
  var now=Date.now();
  var s1=document.getElementById('s1-'+n)?document.getElementById('s1-'+n).value:'';
  var s2=document.getElementById('s2-'+n)?document.getElementById('s2-'+n).value:'';
  getNextMatchId(function(mid){
  var mdata={
    matchId:mid, tableNumber:n, tournament:tname, bestOf:bo,
    currentFrame:1, status:'active', matchWinner:null,
    turn:bf, breakPlayer:bf, frameBreaker:bf, currentBreak:0,
    breakBalls:[], redsRemaining:15, lastFoul:null,
    matchStartTime:now, frameStartTime:now,
    shotClockEnabled:scEnabled, shotClockDuration:scDuration, shotClockStarted:now,
    bestBreak1:0, bestBreak2:0,
    player1:{name:p1,frames:0,score:0,state:s1},
    player2:{name:p2,frames:0,score:0,state:s2}
  };
  db.ref('matches/table-'+n).set(mdata);
  db.ref('match_registry/'+mid).set({
    matchId:mid, tournament:tname, bestOf:bo,
    tableNumber:n, status:'active',
    p1:p1, p1state:s1, p2:p2, p2state:s2,
    startTime:now, referee:''
  }).then(function(){btn.disabled=false;})
  .catch(function(e){alert('Firebase error: '+e.message);btn.disabled=false;btn.textContent='▶ Start Match';});
  }); // end getNextMatchId
}

function endMatch(n){
  if(!confirm('End match on Table '+n+'?'))return;
  db.ref('matches/table-'+n).remove();
}

function copyOBS(n){
  var url=window.location.href.replace('setup.html','')+'overlay.html?table='+n;
  navigator.clipboard.writeText(url).then(function(){showToast('Copied OBS link for Table '+n);});
}

function showToast(msg){
  var t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},2200);
}
</script>
</body>
</html>
