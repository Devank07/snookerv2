<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Firebase Diagnostic</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #07120d; color: #e8f4e0; font-family: Arial, sans-serif; padding: 24px; }
h1 { color: #c9a227; font-size: 1.2rem; letter-spacing: 2px; margin-bottom: 20px; }
.card { background: #0d2018; border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 16px; margin-bottom: 14px; }
.card h2 { font-size: 0.75rem; color: #c9a227; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
.status { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; margin-bottom: 8px; }
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.dot.green { background: #2ecc71; box-shadow: 0 0 6px rgba(46,204,113,0.6); }
.dot.red   { background: #e74c3c; box-shadow: 0 0 6px rgba(231,76,60,0.6); }
.dot.yellow{ background: #f1c40f; box-shadow: 0 0 6px rgba(241,196,15,0.6); animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
pre { background: #060f0a; border: 1px solid rgba(255,255,255,0.06); border-radius: 7px; padding: 12px; font-size: 0.72rem; color: #8aab8a; overflow-x: auto; white-space: pre-wrap; word-break: break-all; max-height: 200px; overflow-y: auto; line-height: 1.5; }
.btn { padding: 10px 20px; background: linear-gradient(135deg,#1c3f1c,#0d2318); color: #c9a227; border: 1px solid #c9a227; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: bold; margin-right: 8px; margin-top: 8px; }
.btn:hover { background: linear-gradient(135deg,#265226,#122a1c); }
.err { color: #e74c3c; font-size: 0.8rem; margin-top: 6px; }
</style>
</head>
<body>
<h1>🔍 Firebase Diagnostic</h1>

<div class="card">
  <h2>Connection Status</h2>
  <div class="status"><div class="dot yellow" id="conn-dot"></div><span id="conn-text">Connecting to Firebase...</span></div>
</div>

<div class="card">
  <h2>Database Contents (raw)</h2>
  <div class="status"><div class="dot yellow" id="db-dot"></div><span id="db-text">Reading database...</span></div>
  <pre id="db-raw">Loading...</pre>
</div>

<div class="card">
  <h2>Table Paths Check</h2>
  <div id="table-checks">Checking...</div>
</div>

<div class="card">
  <h2>Actions</h2>
  <button class="btn" onclick="writeTest()">Write Test Match (Table 1)</button>
  <button class="btn" onclick="clearAll()">Clear All Matches</button>
  <button class="btn" onclick="location.reload()">Refresh</button>
  <div class="err" id="action-msg"></div>
</div>

<script>
var fbConfig = {
  apiKey: "AIzaSyAxNVCaOyZvk69fqR-qTCyjbvE1gAbiBXE",
  authDomain: "snooker-scorer-56573.firebaseapp.com",
  databaseURL: "https://snooker-scorer-56573-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "snooker-scorer-56573",
  storageBucket: "snooker-scorer-56573.firebasestorage.app",
  messagingSenderId: "774218957368",
  appId: "1:774218957368:web:3b2c9cc363c0627ab35ccd"
};

var app = firebase.initializeApp(fbConfig);
var db = firebase.database();

// Connection check
var connRef = db.ref('.info/connected');
connRef.on('value', function(snap) {
  var connected = snap.val();
  var dot = document.getElementById('conn-dot');
  var txt = document.getElementById('conn-text');
  if (connected) {
    dot.className = 'dot green';
    txt.textContent = 'Connected to Firebase ✓';
    txt.style.color = '#2ecc71';
  } else {
    dot.className = 'dot red';
    txt.textContent = 'NOT connected to Firebase ✗';
    txt.style.color = '#e74c3c';
  }
});

// Read entire database
db.ref('/').on('value', function(snap) {
  var data = snap.val();
  var dot = document.getElementById('db-dot');
  var txt = document.getElementById('db-text');
  var raw = document.getElementById('db-raw');

  if (data === null) {
    dot.className = 'dot yellow';
    txt.textContent = 'Database is empty — no data written yet';
    txt.style.color = '#f1c40f';
    raw.textContent = '(empty)';
  } else {
    dot.className = 'dot green';
    txt.textContent = 'Data found ✓';
    txt.style.color = '#2ecc71';
    raw.textContent = JSON.stringify(data, null, 2);
  }
}, function(err) {
  document.getElementById('db-dot').className = 'dot red';
  document.getElementById('db-text').textContent = 'Read error: ' + err.message;
  document.getElementById('db-text').style.color = '#e74c3c';
  document.getElementById('db-raw').textContent = 'ERROR: ' + err.message;
});

// Check each table path
var checks = document.getElementById('table-checks');
checks.innerHTML = '';
[1,2,3,4,5,6].forEach(function(n) {
  var row = document.createElement('div');
  row.className = 'status';
  row.innerHTML = '<div class="dot yellow" id="tdot-'+n+'"></div><span id="ttxt-'+n+'">Table '+n+' — checking...</span>';
  checks.appendChild(row);

  db.ref('matches/table-' + n).once('value', function(snap) {
    var d = snap.val();
    var dot = document.getElementById('tdot-' + n);
    var txt = document.getElementById('ttxt-' + n);
    if (d && d.status === 'active') {
      dot.className = 'dot green';
      txt.textContent = 'Table ' + n + ' — LIVE: ' + d.player1.name + ' vs ' + d.player2.name + ' · Frame ' + d.currentFrame;
    } else if (d) {
      dot.className = 'dot yellow';
      txt.textContent = 'Table ' + n + ' — Data exists but status: ' + d.status;
    } else {
      dot.className = 'dot red';
      txt.textContent = 'Table ' + n + ' — No match data at matches/table-' + n;
      txt.style.color = 'rgba(232,244,224,0.35)';
    }
  }, function(err) {
    document.getElementById('tdot-' + n).className = 'dot red';
    document.getElementById('ttxt-' + n).textContent = 'Table ' + n + ' — ERROR: ' + err.message;
    document.getElementById('ttxt-' + n).style.color = '#e74c3c';
  });
});

// Write test match
function writeTest() {
  var testData = {
    tableNumber: 1, tournament: 'Test Tournament',
    bestOf: 9, currentFrame: 1, status: 'active', matchWinner: null,
    turn: 1, breakPlayer: 1, currentBreak: 47,
    breakBalls: [{color:'red',value:1},{color:'black',value:7},{color:'red',value:1},{color:'pink',value:6},{color:'red',value:1},{color:'black',value:7},{color:'red',value:1},{color:'black',value:7}],
    redsRemaining: 11, lastFoul: null,
    player1: {name:'Ronnie O Sullivan', frames:2, score:47},
    player2: {name:'Mark Selby', frames:1, score:18}
  };
  db.ref('matches/table-1').set(testData)
    .then(function() {
      document.getElementById('action-msg').style.color = '#2ecc71';
      document.getElementById('action-msg').textContent = '✓ Test match written to table-1. Now check scoreboard.html?table=1';
    })
    .catch(function(e) {
      document.getElementById('action-msg').style.color = '#e74c3c';
      document.getElementById('action-msg').textContent = 'Write failed: ' + e.message;
    });
}

function clearAll() {
  if (!confirm('Clear all match data?')) return;
  db.ref('matches').remove()
    .then(function() {
      document.getElementById('action-msg').style.color = '#f1c40f';
      document.getElementById('action-msg').textContent = 'All matches cleared.';
    });
}
</script>
</body>
</html>
